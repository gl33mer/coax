# Secret Scanning Exclusion Configuration
# https://docs.github.com/code-security/secret-scanning/using-advanced-secret-scanning-and-push-protection-features/excluding-folders-from-secret-scanning

exclude_paths:
  # Benchmark test data
  - 'coax-benchmarks/datasets/secrets/**'
  
  # Test files with example secrets
  - 'crates/coax-scanner/tests/entropy_tests.rs'
  - 'crates/coax-scanner/tests/fp_reduction_tests.rs'
  - 'crates/coax-scanner/tests/pattern_tests.rs'
  - 'crates/coax-scanner/src/entropy_filter.rs'
  - 'crates/coax-scanner/src/token_efficiency.rs'
  - 'crates/coax-scanner/src/word_filter.rs'
  - 'crates/coax-scanner/src/context.rs'
  - 'crates/coax-scanner/src/baseline.rs'
  
  # Test code directories
  - 'crates/coax-scanner/src/cfg/**'
  - 'crates/coax-scanner/examples/**'
  - 'crates/coax-scanner/benches/**'
  
  # QA test files
  - 'qa/**'
  
  # Threat model test files
  - 'crates/coax-threat-model/tests/**'
  
  # TUI test files  
  - 'crates/coax-tui/tests/**'
