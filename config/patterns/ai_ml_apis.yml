# AI/ML Service API Keys
# Patterns for detecting exposed AI and ML service credentials

patterns:
  # OpenAI
  - name: OPENAI_API_KEY
    regex: 'sk-proj-[a-zA-Z0-9]{48}'
    severity: critical
    recommendation: "Remove and revoke in OpenAI Platform immediately"
    description: "OpenAI API Key"
    cwe_id: "CWE-798"
    confidence: high
    category: ai_ml
    enabled: true

  - name: OPENAI_LEGACY_API_KEY
    regex: 'sk-[a-zA-Z0-9]{48}'
    severity: critical
    recommendation: "Remove and revoke in OpenAI Platform immediately"
    description: "OpenAI Legacy API Key"
    cwe_id: "CWE-798"
    confidence: high
    category: ai_ml
    enabled: true

  - name: OPENAI_SESSION_TOKEN
    regex: '(?i)openai.*session.*token\s*[:=]\s*[''"]?[a-zA-Z0-9_-]{40,}[''"]?'
    severity: high
    recommendation: "Remove and invalidate OpenAI session token"
    description: "OpenAI Session Token"
    cwe_id: "CWE-798"
    confidence: medium
    category: ai_ml
    enabled: true

  # Anthropic
  - name: ANTHROPIC_API_KEY
    regex: 'sk-ant-api[0-9]{2}-[a-zA-Z0-9_-]{49}'
    severity: critical
    recommendation: "Remove and revoke in Anthropic Console immediately"
    description: "Anthropic API Key"
    cwe_id: "CWE-798"
    confidence: high
    category: ai_ml
    enabled: true

  - name: ANTHROPIC_SESSION_KEY
    regex: 'sk-ant-s-[a-zA-Z0-9_-]{90,}'
    severity: critical
    recommendation: "Remove and revoke Anthropic session key"
    description: "Anthropic Session Key"
    cwe_id: "CWE-798"
    confidence: high
    category: ai_ml
    enabled: true

  # Hugging Face
  - name: HUGGINGFACE_TOKEN
    regex: 'hf_[a-zA-Z0-9]{34}'
    severity: critical
    recommendation: "Remove and delete in Hugging Face Settings immediately"
    description: "Hugging Face Token"
    cwe_id: "CWE-798"
    confidence: high
    category: ai_ml
    enabled: true

  - name: HUGGINGFACE_API_KEY
    regex: '(?i)huggingface.*api.*key\s*[:=]\s*[''"]?hf_[a-zA-Z0-9]{34}[''"]?'
    severity: critical
    recommendation: "Remove and delete in Hugging Face Settings"
    description: "Hugging Face API Key"
    cwe_id: "CWE-798"
    confidence: high
    category: ai_ml
    enabled: true

  # Cohere
  - name: COHERE_API_KEY
    regex: '(?i)cohere.*api.*key\s*[:=]\s*[''"]?[a-zA-Z0-9]{32,}[''"]?'
    severity: critical
    recommendation: "Remove and regenerate in Cohere Dashboard"
    description: "Cohere API Key"
    cwe_id: "CWE-798"
    confidence: medium
    category: ai_ml
    enabled: true

  # AI21
  - name: AI21_API_KEY
    regex: '(?i)ai21.*api.*key\s*[:=]\s*[''"]?[a-zA-Z0-9_-]{32,}[''"]?'
    severity: critical
    recommendation: "Remove and regenerate in AI21 Studio"
