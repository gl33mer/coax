    cwe_id: "CWE-798"
    confidence: high
    category: ai_ml
    enabled: true

  # Stability AI
  - name: STABILITY_AI_KEY
    regex: '(?i)stability.*api.*key\s*[:=]\s*[''"]?[a-zA-Z0-9_-]{32,}[''"]?'
    severity: critical
    recommendation: "Remove and regenerate in Stability AI Platform"
    description: "Stability AI API Key"
    cwe_id: "CWE-798"
    confidence: medium
    category: ai_ml
    enabled: true

  # Together AI
  - name: TOGETHER_AI_KEY
    regex: '(?i)together.*api.*key\s*[:=]\s*[''"]?[a-zA-Z0-9_-]{40,}[''"]?'
    severity: critical
