    confidence: medium
    category: ai_ml
    enabled: true

  # Replicate
  - name: REPLICATE_API_TOKEN
    regex: 'r8_[a-zA-Z0-9]{37}'
    severity: critical
    recommendation: "Remove and revoke in Replicate Dashboard"
